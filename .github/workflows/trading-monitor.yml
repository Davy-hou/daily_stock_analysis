name: 盘中实时监控
run-name: 多标 RSI 监控 @ ${{ github.run_attempt }}

on:
  schedule:
    # 北京时间 09:30~14:50 (UTC 01:30~06:50)，每 10 分钟
    - cron: '*/10 1-6 * * 1-5'
  workflow_dispatch:

# 并发：串行执行，不取消正在运行的
concurrency:
  group: trading-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 恢复上一次运行的状态（RSI 告警已发标记）
      - name: 恢复监控状态
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .monitor_state.json
          key: monitor-state-multi-${{ github.run_id }}
          restore-keys: |
            monitor-state-multi-

      - name: 运行监控检查
        id: monitor
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python scripts/trading_monitor.py

      # 保存状态给下一次运行
      - name: 保存监控状态
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .monitor_state.json
          key: monitor-state-multi-${{ github.run_id }}
